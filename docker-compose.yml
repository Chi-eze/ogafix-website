version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ogafix-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DB_HOST: ${DB_HOST:-ogafix-db.clug0ckyoc91.eu-west-1.rds.amazonaws.com}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-ogafix}
      DB_USER: ${DB_USER:-ogafixadmin}
      DB_PASSWORD: ${DB_PASSWORD:-ChangeMe123!}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    restart: unless-stopped
    networks:
      - ogafix-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ogafix-frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ogafix-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  ogafix-network:
    driver: bridge
